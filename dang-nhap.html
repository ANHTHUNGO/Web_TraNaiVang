<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đăng nhập / Đăng ký — Trà Nai Vàng</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css?v=170727">
<script src="assets/i18n.js?v=170727"></script>
<script src="assets/store.js?v=170727"></script>
<style>
  .auth{min-height:calc(100vh - 240px);display:grid;place-items:center;padding:50px 20px;position:relative}
  .auth::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,var(--sage-100),transparent 60%);z-index:0}
  .acard{position:relative;z-index:2;width:100%;max-width:440px;background:var(--paper);border:1px solid var(--line-soft);border-radius:20px;box-shadow:var(--shadow);padding:36px 34px}
  .acard .logo{width:64px;margin:0 auto 14px;display:block}
  .acard h1{font-size:24px;font-weight:500;text-align:center}
  .acard .sub{font-size:13px;color:var(--stone);text-align:center;margin:6px 0 22px}
  .atabs{display:grid;grid-template-columns:1fr 1fr;background:var(--off);border-radius:40px;padding:4px;margin-bottom:24px}
  .atabs button{border:none;background:transparent;padding:11px;border-radius:40px;font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--stone);cursor:pointer;transition:all .25s}
  .atabs button.on{background:var(--paper);color:var(--tea);box-shadow:0 3px 10px -3px rgba(40,60,26,.25)}
  .pane{display:none}.pane.on{display:block}
  .between{display:flex;justify-content:space-between;align-items:center;margin:2px 0 18px;font-size:13px}
  .between a{color:var(--tea)}
  .pwd{position:relative}
  .pwd button{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--stone);cursor:pointer;font-size:12px}
  .divider{display:flex;align-items:center;gap:12px;color:var(--stone);font-size:12px;margin:20px 0}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line-soft)}
  .socials{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .socials button{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1px solid var(--line);border-radius:40px;background:var(--paper);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:border .2s}
  .socials button:hover{border-color:var(--tea)}
  .frow2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:440px){.frow2{grid-template-columns:1fr}}
</style>
</head>
<body data-page="dang-nhap">
<main class="auth">
  <div class="acard">
    <img class="logo" src="assets/logo-full.png" alt="Trà Nai Vàng"/>
    <h1 data-i18n="au.welcome">Chào mừng trở lại</h1>
    <p class="sub" data-i18n="au.sub">Đăng nhập để theo dõi đơn hàng và nhận ưu đãi thành viên</p>
    <div class="atabs"><button id="tLogin" class="on" data-i18n="au.login">Đăng nhập</button><button id="tReg" data-i18n="au.reg">Đăng ký</button></div>

    <!-- LOGIN -->
    <div class="pane on" id="pLogin">
      <div class="field"><label data-i18n="au.id">Email hoặc số điện thoại</label><input id="l-id" placeholder="email@vidu.com / 09xxxxxxxx"/><div class="err">Nhập email hoặc SĐT</div></div>
      <div class="field pwd"><label data-i18n="au.pw">Mật khẩu</label><input id="l-pw" type="password" placeholder="••••••••"/><button type="button" data-eye="l-pw" data-i18n="au.show">Hiện</button><div class="err">Nhập mật khẩu</div></div>
      <div class="between">
        <label class="check" style="align-items:center"><input type="checkbox" id="l-rem" checked/> <span data-i18n="au.remember">Ghi nhớ đăng nhập</span></label>
        <a href="#" onclick="showToast('Tính năng sẽ kích hoạt khi có backend');return false" data-i18n="au.forgot">Quên mật khẩu?</a>
      </div>
      <button class="btn btn-primary btn-block" id="loginBtn" data-i18n="au.login">Đăng nhập</button>
      <div class="divider" data-i18n="au.or">hoặc tiếp tục với</div>
      <div class="socials">
        <button onclick="showToast('Đăng nhập Google sẽ kích hoạt khi có backend')"><svg width="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M23 12.3c0-.8-.1-1.6-.2-2.3H12v4.5h6.2a5.3 5.3 0 0 1-2.3 3.5v2.9h3.7c2.2-2 3.4-5 3.4-8.6z"/><path fill="#34A853" d="M12 24c3.1 0 5.7-1 7.6-2.8l-3.7-2.9c-1 .7-2.4 1.1-3.9 1.1-3 0-5.5-2-6.4-4.8H1.8v3A11.5 11.5 0 0 0 12 24z"/><path fill="#FBBC05" d="M5.6 14.6a7 7 0 0 1 0-4.4v-3H1.8a11.6 11.6 0 0 0 0 10.4l3.8-3z"/><path fill="#EA4335" d="M12 4.6c1.7 0 3.2.6 4.4 1.7l3.3-3.3A11.5 11.5 0 0 0 1.8 7.2l3.8 3c.9-2.8 3.4-5.6 6.4-5.6z"/></svg>Google</button>
        <button onclick="showToast('Đăng nhập Facebook sẽ kích hoạt khi có backend')"><svg width="16" viewBox="0 0 24 24" fill="#1877F2"><path d="M13 22v-8h3l1-4h-4V8c0-1.1.3-2 2-2h2V2.2C18.4 2.1 17.2 2 15.8 2 12.9 2 11 3.7 11 7v3H8v4h3v8h2Z"/></svg>Facebook</button>
      </div>
    </div>

    <!-- REGISTER -->
    <div class="pane" id="pReg">
      <div class="field"><label data-i18n="au.name">Họ và tên *</label><input id="r-name" placeholder="Nguyễn Văn A"/><div class="err">Vui lòng nhập họ tên</div></div>
      <div class="frow2">
        <div class="field"><label data-i18n="au.phone">Số điện thoại *</label><input id="r-phone" inputmode="tel" placeholder="09xxxxxxxx"/><div class="err">SĐT chưa đúng</div></div>
        <div class="field"><label data-i18n="au.email">Email *</label><input id="r-email" type="email" placeholder="ban@email.com"/><div class="err">Email chưa đúng</div></div>
      </div>
      <div class="frow2">
        <div class="field pwd"><label data-i18n="au.pwReq">Mật khẩu *</label><input id="r-pw" type="password" placeholder="Tối thiểu 6 ký tự"/><button type="button" data-eye="r-pw" data-i18n="au.show">Hiện</button><div class="err">Tối thiểu 6 ký tự</div></div>
        <div class="field"><label data-i18n="au.pw2">Nhập lại mật khẩu *</label><input id="r-pw2" type="password"/><div class="err">Mật khẩu chưa khớp</div></div>
      </div>
      <div class="frow2">
        <div class="field"><label data-i18n="au.dob">Ngày sinh <small>(tuỳ chọn)</small></label><input id="r-dob" type="date"/></div>
        <div class="field"><label data-i18n="au.sex">Giới tính <small>(tuỳ chọn)</small></label><select id="r-sex"><option value="">—</option><option>Nữ</option><option>Nam</option><option>Khác</option></select></div>
      </div>
      <div class="field">
        <label class="check"><input type="checkbox" id="r-agree"/> <span data-i18n="au.agree">Tôi đồng ý với Điều khoản và Chính sách.</span></label>
        <div class="err" id="agreeErr" style="display:none">Bạn cần đồng ý điều khoản để tiếp tục</div>
      </div>
      <button class="btn btn-primary btn-block" id="regBtn" data-i18n="au.regBtn">Đăng ký tài khoản</button>
    </div>
  </div>
</main>

<script src="assets/layout.js?v=170727"></script>
<script>
/* nếu đã đăng nhập → vào thẳng tài khoản */
if(currentUser()) location.href='tai-khoan.html';
const T={login:[document.getElementById('tLogin'),document.getElementById('pLogin')],reg:[document.getElementById('tReg'),document.getElementById('pReg')]};
function tab(k){for(const [key,[b,p]] of Object.entries(T)){b.classList.toggle('on',key===k);p.classList.toggle('on',key===k);}}
T.login[0].onclick=()=>tab('login'); T.reg[0].onclick=()=>tab('reg');
if(location.hash==='#dang-ky') tab('reg');
document.querySelectorAll('[data-eye]').forEach(b=>b.onclick=()=>{
  const i=document.getElementById(b.dataset.eye);
  i.type=i.type==='password'?'text':'password'; b.textContent=i.type==='password'?t('au.show'):t('au.hide');
});
function bad(id,is){const f=document.getElementById(id).closest('.field');f.classList.toggle('invalid',is);return !is;}
document.getElementById('loginBtn').onclick=()=>{
  const idv=document.getElementById('l-id').value.trim(), pw=document.getElementById('l-pw').value;
  let ok=bad('l-id',!idv)&bad('l-pw',!pw);
  if(!ok)return;
  const saved=currentUser();
  setUser(saved&&(saved.email===idv||saved.phone===idv)?saved:{name:idv.includes('@')?idv.split('@')[0]:'Khách hàng',email:idv.includes('@')?idv:'',phone:idv.includes('@')?'':idv,points:120});
  showToast('Đăng nhập thành công!');
  setTimeout(()=>location.href='tai-khoan.html',600);
};
document.getElementById('regBtn').onclick=()=>{
  const v=id=>document.getElementById(id).value.trim();
  let ok=true;
  ok&=bad('r-name',v('r-name').length<2);
  ok&=bad('r-phone',!/^0\d{8,10}$/.test(v('r-phone')));
  ok&=bad('r-email',!/^\S+@\S+\.\S+$/.test(v('r-email')));
  ok&=bad('r-pw',v('r-pw').length<6);
  ok&=bad('r-pw2',v('r-pw2')!==v('r-pw')||!v('r-pw2'));
  const agree=document.getElementById('r-agree').checked;
  document.getElementById('agreeErr').style.display=agree?'none':'block';
  ok&=agree;
  if(!ok)return;
  openConsentModal(v);
};

/* B2: xin quyen theo chinh sach nen tang & phap luat (Nghi dinh 13/2023/ND-CP) */
function openConsentModal(v){
  const w=document.createElement('div'); w.className='modal-wrap';
  w.innerHTML=`<div class="modal">
    <h3>🔔 ${t('cs.title')}</h3>
    <p class="cx-note">${t('cs.intro')}</p>
    <label class="cx-opt" style="align-items:flex-start"><input type="checkbox" checked disabled style="margin-top:3px"/><span><b style="font-size:13.5px">${t('cs.noti')}</b><br/><small style="color:var(--stone)">${t('cs.notiS')}</small></span></label>
    <label class="cx-opt" style="align-items:flex-start"><input type="checkbox" id="cs-loc" style="margin-top:3px"/><span><b style="font-size:13.5px">${t('cs.loc')}</b><br/><small style="color:var(--stone)">${t('cs.locS')}</small></span></label>
    <label class="cx-opt" style="align-items:flex-start"><input type="checkbox" id="cs-track" style="margin-top:3px"/><span><b style="font-size:13.5px">${t('cs.track')}</b><br/><small style="color:var(--stone)">${t('cs.trackS')}</small></span></label>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="csBack">${t('cs.back')}</button>
      <button class="btn btn-primary" id="csGo">${t('cs.agree')}</button>
    </div></div>`;
  document.body.appendChild(w);
  w.querySelector('#csBack').onclick=()=>w.remove();
  w.querySelector('#csGo').onclick=()=>{
    const consent={noti:true, loc:w.querySelector('#cs-loc').checked, track:w.querySelector('#cs-track').checked, at:new Date().toLocaleString('vi-VN')};
    try{ if('Notification' in window && Notification.permission==='default') Notification.requestPermission(); }catch(e){}
    try{ if(consent.loc && navigator.geolocation) navigator.geolocation.getCurrentPosition(()=>{},()=>{},{timeout:3000}); }catch(e){}
    setUser({name:v('r-name'),phone:v('r-phone'),email:v('r-email'),dob:v('r-dob'),sex:v('r-sex'),points:100,consent});
    w.remove();
    showToast('Tạo tài khoản thành công! Chuông thông báo đã bật 🔔');
    setTimeout(()=>location.href='tai-khoan.html',800);
  };
}
</script>
</body>
</html>
