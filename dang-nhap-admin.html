<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đăng nhập Admin — Trà Nai Vàng</title><meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css?v=170739">
<style>
 body{background:linear-gradient(160deg,#22301a,#0f1809)}
 .wrapA{min-height:100vh;display:grid;place-items:center;padding:40px 20px}
 .acard{width:100%;max-width:400px;background:var(--paper);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.4);padding:38px 34px}
 .acard img{width:58px;margin:0 auto 14px;display:block}
 .acard h1{font-size:22px;font-weight:600;text-align:center}
 .acard p{font-size:13px;color:var(--stone);text-align:center;margin:6px 0 22px}
 .field{margin-bottom:14px}.field label{font-size:12.5px;font-weight:600;display:block;margin-bottom:6px}
 .field input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-family:var(--sans);font-size:14px}
</style></head>
<body>
<div class="wrapA"><div class="acard">
  <img src="assets/logo-full.png" alt="Nai Vàng"/>
  <h1>Quản trị Trà Nai Vàng</h1>
  <p>Cổng dành riêng cho Admin công ty</p>
  <div class="field"><label>Tài khoản Admin</label><input id="au" placeholder="Tên đăng nhập quản trị" autocomplete="username"/></div>
  <div class="field"><label>Mật khẩu</label><input id="ap" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
  <button class="btn btn-primary btn-block" id="aBtn">Đăng nhập quản trị</button>
  <p style="margin-top:16px;font-size:11.5px;color:var(--stone);text-align:center">🔒 Khu vực dành riêng cho quản trị viên. Truy cập trái phép bị nghiêm cấm.</p>
  <p style="margin-top:10px;text-align:center"><a href="index.html" style="color:var(--tea);font-size:12.5px">← Về trang chủ website</a></p>
</div></div>
<script>
function toast(m){let t=document.createElement('div');t.textContent=m;t.style.cssText='position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#28321f;color:#fff;padding:12px 22px;border-radius:30px;font-size:13.5px;z-index:999';document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
document.getElementById('aBtn').onclick=()=>{
  const u=document.getElementById('au').value.trim(), p=document.getElementById('ap').value.trim();
  if(!u||!p){toast('Nhập tài khoản & mật khẩu');return;}
  if(u.toLowerCase()==='admintranaivang'&&p==='888999'){sessionStorage.setItem('nv_admin','1');toast('Đăng nhập thành công!');setTimeout(()=>location.href='dashboard-admin.html',500);}
  else toast('Sai tài khoản hoặc mật khẩu.');
};
document.getElementById('ap').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('aBtn').click();});
</script>
</body></html>
