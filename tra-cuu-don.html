</head><body data-page="tra-cuu">
<section class="phead"><div class="wrap"><div class="crumb"><a href="index.html">Trang chủ</a> › <b>Tra cứu đơn hàng</b></div><h1>Tra cứu đơn hàng</h1><p>Nhập mã đơn và số điện thoại để kiểm tra tình trạng đơn của bạn.</p></div></section>
<div class="wrap" style="padding:34px 0 60px;max-width:720px">
 <div class="panel">
   <div class="frow"><div class="field"><label>Mã đơn hàng *</label><input id="t-code" placeholder="VD: NV12345678"/></div>
     <div class="field"><label>Số điện thoại *</label><input id="t-phone" inputmode="tel" placeholder="SĐT đặt hàng"/></div></div>
   <button class="btn btn-primary" id="tBtn">Tra cứu</button>
   <p style="font-size:12px;color:var(--stone);margin-top:10px">Vì lý do bảo mật, bạn cần nhập đúng mã đơn và số điện thoại đã đặt. Hoặc <a href="tai-khoan.html#orders" style="color:var(--tea)">đăng nhập</a> để xem tất cả đơn.</p>
 </div>
 <div id="tResult" style="margin-top:22px"></div>
</div>
<script src="assets/layout.js?v=170733"></script><script>
const ST={pending:['pending','Chờ xác nhận'],confirm:['confirm','Đã xác nhận'],shipping:['shipping','Đang giao'],done:['done','Giao thành công'],cancelled:['cancelled','Đã hủy']};
document.getElementById('tBtn').onclick=()=>{
 const code=document.getElementById('t-code').value.trim().toUpperCase();
 const phone=document.getElementById('t-phone').value.replace(/\s/g,'');
 const o=orders().find(x=>x.code.toUpperCase()===code && (x.addr&&x.addr.phone||'').replace(/\s/g,'')===phone);
 const box=document.getElementById('tResult');
 if(!o){box.innerHTML=`<div class="box" style="text-align:center;color:var(--stone)">Không tìm thấy đơn hàng khớp thông tin. Vui lòng kiểm tra lại mã đơn và số điện thoại.</div>`;return;}
 const s=orderStatus(o),idx=({pending:0,confirm:1,shipping:2,done:3})[s]??0;
 box.innerHTML=`<div class="panel"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px"><span>Mã đơn <b style="color:var(--tea)">${o.code}</b> · ${o.date}</span><span class="st ${ST[s][0]}">${ST[s][1]}</span></div>
  ${o.items.map(i=>`<div class="oi" style="display:flex;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px"><img src="${prodImg(i.slug)}" style="width:46px;height:46px;border-radius:9px;object-fit:cover"/><span>${i.name} × ${i.qty}</span><b style="margin-left:auto;font-family:var(--serif);color:var(--tea)">${fmt(i.price*i.qty)}</b></div>`).join('')}
  <div style="text-align:right;margin-top:10px">Tổng cộng: <b style="font-family:var(--serif);font-size:18px;color:var(--tea)">${fmt(o.total)}</b></div>
  <a class="btn btn-ghost" style="margin-top:14px" href="xac-nhan-don.html?ma=${o.code}">Xem chi tiết đơn →</a></div>`;
};
const pm=new URLSearchParams(location.search);if(pm.get('ma'))document.getElementById('t-code').value=pm.get('ma');
</script></body></html>
