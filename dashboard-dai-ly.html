<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cổng đại lý — Hệ thống quản lý đại lý Trà Nai Vàng</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css?v=170740">
<script src="assets/store.js?v=170740"></script>

<style>
  body{background:var(--off)}
  .dwrap{display:grid;grid-template-columns:246px 1fr;min-height:100vh;align-items:start}
  .dside{background:linear-gradient(180deg,var(--forest),var(--pine));color:#eaf0e0;min-height:100vh;position:sticky;top:0;display:flex;flex-direction:column}
  .dside .brand{display:flex;gap:11px;align-items:center;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
  .dside .brand img{width:38px;height:38px;border-radius:9px;background:#fff;padding:3px}
  .dside .brand b{font-family:var(--serif);font-size:15px;color:#fff;line-height:1.15}
  .dside .brand small{font-size:10.5px;color:var(--gold-light);letter-spacing:.04em}
  .dnav{flex:1;overflow-y:auto;padding:10px 0 20px}
  .dnav .grp{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(234,240,224,.5);padding:14px 22px 6px}
  .dnav button{display:flex;align-items:center;gap:11px;width:100%;padding:10px 22px;border:none;background:none;color:#dfe8d2;font-family:var(--sans);font-size:13.5px;font-weight:500;cursor:pointer;text-align:left;border-left:3px solid transparent;transition:.18s}
  .dnav button:hover{background:rgba(255,255,255,.07)}
  .dnav button.on{background:rgba(255,255,255,.12);border-color:var(--gold-light);color:#fff}
  .dnav button svg{width:17px;flex:none;opacity:.85}
  .dnav .bdg{margin-left:auto;background:var(--gold-light);color:#4a3d16;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:grid;place-items:center;padding:0 5px}
  .dmain{padding:0 0 50px}
  .dtop{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:15px 30px;background:var(--paper);border-bottom:1px solid var(--line-soft);position:sticky;top:0;z-index:20}
  .dtop h1{font-size:19px;font-weight:600}
  .dtop .who{display:flex;align-items:center;gap:12px;font-size:13px}
  .dtop .who .ava{width:38px;height:38px;border-radius:50%;background:var(--tea);color:#fff;display:grid;place-items:center;font-family:var(--serif);font-size:17px}
  .dtop .who b{display:block;font-size:13.5px}.dtop .who small{color:var(--stone);font-size:11.5px}
  .dbody{padding:26px 30px}
  .dpane{display:none}.dpane.on{display:block}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .kpi{background:var(--paper);border:1px solid var(--line-soft);border-radius:15px;padding:17px 18px}
  .kpi .lb{font-size:12px;color:var(--stone);display:flex;align-items:center;gap:7px}
  .kpi .vl{font-family:var(--serif);font-size:25px;margin-top:7px;color:var(--forest);line-height:1.1}
  .kpi .sub{font-size:11.5px;color:var(--stone);margin-top:4px}
  .kpi.acc{background:linear-gradient(135deg,var(--forest),var(--pine));color:#fff;border:none}
  .kpi.acc .lb,.kpi.acc .sub{color:rgba(255,255,255,.8)}.kpi.acc .vl{color:var(--gold-light)}
  .card{background:var(--paper);border:1px solid var(--line-soft);border-radius:16px;padding:22px}
  .card h3{font-size:15.5px;font-weight:600;margin-bottom:4px}
  .card .cdesc{font-size:12.5px;color:var(--stone);margin-bottom:16px}
  .grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:18px}
  .prog{height:12px;border-radius:8px;background:var(--sage-100);overflow:hidden;margin:10px 0 6px}
  .prog i{display:block;height:100%;background:linear-gradient(90deg,var(--tea),var(--gold-light));border-radius:8px}
  .bars{display:flex;align-items:flex-end;gap:12px;height:150px;padding-top:10px}
  .bars .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .bars .b i{width:100%;max-width:34px;background:linear-gradient(180deg,var(--sage),var(--tea));border-radius:6px 6px 0 0}
  .bars .b span{font-size:11px;color:var(--stone)}
  .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th{text-align:left;padding:11px 12px;background:var(--off);color:var(--stone);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
  .tbl td{padding:12px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
  .tbl tr:hover td{background:var(--cream)}
  .tbl .tr{text-align:right}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
  .b-green{background:#E3F0DC;color:#3c6b28}.b-blue{background:#E0EBF6;color:#2c5f8a}.b-amber{background:#FBF0D5;color:#8a6d1a}
  .b-orange{background:#FBE6D2;color:#9a5a1a}.b-red{background:#F8DDD8;color:#b23b2a}.b-gray{background:#ececea;color:#666}
  .wp{display:flex;gap:13px;align-items:center}
  .wp img{width:52px;height:52px;border-radius:9px;object-fit:cover;border:1px solid var(--line-soft)}
  .wp b{display:block;font-size:13.5px}.wp small{color:var(--stone);font-size:11.5px}
  .qty{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .qty button{width:28px;height:30px;border:none;background:var(--off);cursor:pointer;font-size:15px;color:var(--tea)}
  .qty input{width:42px;height:30px;border:none;text-align:center;font-family:var(--sans);font-size:13px}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .filters button{border:1px solid var(--line);background:var(--paper);padding:8px 15px;border-radius:30px;font-family:var(--sans);font-size:12.5px;cursor:pointer;color:var(--stone)}
  .filters button.on{background:var(--tea);color:#fff;border-color:var(--tea)}
  .filters select{border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-family:var(--sans);font-size:12.5px;background:var(--paper)}
  .sumrow{display:flex;justify-content:space-between;padding:8px 0;font-size:13.5px;border-bottom:1px dashed var(--line-soft)}
  .sumrow.tot{border:none;padding-top:14px;font-size:16px}.sumrow.tot b{font-family:var(--serif);font-size:22px;color:var(--tea)}
  .alert{display:flex;gap:11px;padding:13px 15px;border-radius:12px;margin-bottom:10px;font-size:13px;align-items:flex-start}
  .alert.warn{background:#FBF0D5}.alert.dang{background:#F8DDD8}.alert.info{background:#E0EBF6}.alert.ok{background:#E3F0DC}
  .vcard2{border:1.5px dashed var(--gold);border-radius:14px;background:#FFFDF5;padding:15px 17px}
  .vcard2 .code{font-family:var(--serif);font-size:20px;color:var(--tea)}
  .empty{text-align:center;color:var(--stone);padding:40px}
  .btn-sm{padding:6px 12px;font-size:12px}
  /* BANNER ƯU ĐÃI ĐẠI LÝ ~4-5cm */
  .dpromo{margin:0}
  .dpromo .in{display:flex;align-items:center;gap:20px;min-height:150px;padding:18px 30px;background:linear-gradient(100deg,var(--forest),var(--pine) 55%,#5E7C3E);color:#fff;position:relative;overflow:hidden}
  .dpromo .in::after{content:"🎁";position:absolute;right:26px;font-size:120px;opacity:.10;top:50%;transform:translateY(-50%)}
  .dpromo .tag{display:inline-block;background:var(--gold-light);color:#4a3d16;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 12px;border-radius:20px;text-transform:uppercase}
  .dpromo h2{font-family:var(--serif);font-weight:500;font-size:26px;margin:9px 0 6px;line-height:1.15}
  .dpromo p{font-size:14px;color:rgba(238,242,226,.92);max-width:720px;line-height:1.55}
  .dpromo .act{position:relative;z-index:2;margin-top:12px;display:flex;gap:12px;flex-wrap:wrap}
  .dpromo .b1{background:var(--gold-light);color:#4a3d16;border:none;border-radius:30px;padding:10px 20px;font-family:var(--sans);font-weight:600;font-size:13px;cursor:pointer}
  .dpromo .b2{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.6);border-radius:30px;padding:10px 20px;font-family:var(--sans);font-weight:600;font-size:13px;cursor:pointer}
  .dpromo .x{position:absolute;top:12px;right:16px;z-index:3;background:rgba(255,255,255,.15);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:16px}
  /* CHAT */
  .chatwrap{display:grid;grid-template-columns:1fr;max-width:720px;margin:0 auto}
  .chatbox{background:var(--paper);border:1px solid var(--line-soft);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;height:560px}
  .chat-h{display:flex;gap:11px;align-items:center;padding:13px 18px;background:linear-gradient(90deg,var(--forest),var(--pine));color:#fff}
  .chat-h .dot{width:9px;height:9px;border-radius:50%;background:#5fd07a;box-shadow:0 0 0 3px rgba(95,208,122,.3)}
  .chat-h b{font-size:14px}.chat-h small{font-size:11px;color:rgba(255,255,255,.75);display:block}
  .chat-log{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;background:var(--cream)}
  .msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13.5px;line-height:1.5;white-space:pre-wrap}
  .msg.bot{background:var(--sage-100);color:var(--ink);border-bottom-left-radius:4px;align-self:flex-start}
  .msg.me{background:var(--tea);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:0 18px 12px;background:var(--cream)}
  .chips button{border:1px solid var(--tea);background:var(--paper);color:var(--tea);border-radius:30px;padding:7px 13px;font-family:var(--sans);font-size:12.5px;cursor:pointer}
  .chips button:hover{background:var(--sage-100)}
  .chat-in{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--line-soft);background:var(--paper)}
  .chat-in input{flex:1;border:1px solid var(--line);border-radius:30px;padding:10px 16px;font-family:var(--sans);font-size:13.5px}
  .chat-in button{border:none;background:var(--tea);color:#fff;border-radius:50%;width:42px;height:42px;cursor:pointer;flex:none}
  @media(max-width:1050px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
  @media(max-width:820px){.dwrap{grid-template-columns:1fr}.dside{position:static;min-height:auto}.dnav{display:flex;flex-wrap:wrap;padding:8px}.dnav .grp{width:100%}.dnav button{width:auto;border-left:none;border-radius:20px;padding:8px 14px}}
</style>
</head>

<script>
/* ===================== DEALER SESSION ===================== */
const DKEY='nv_dealer';
function dealer(){try{return JSON.parse(localStorage.getItem(DKEY))}catch(e){return null}}
function saveDealer(d){localStorage.setItem(DKEY,JSON.stringify(d))}
let D = dealer();
if(!D){ location.href='dang-nhap-dai-ly.html'; }

/* ===================== PRODUCTS (giá sỉ theo cấp) ===================== */
const PACK={perBox:30, unit:'hộp'};
function wprods(){
  return RETAIL.map((p,idx)=>{
    const retail=p.price, whole=Math.round(retail*(1-D.discount)/500)*500;
    return {slug:p.slug, name:p.name, sku:'TNV-'+p.slug.toUpperCase().replace(/-/g,'').slice(0,8),
      retail, whole, perBox:PACK.perBox, boxPrice:whole*PACK.perBox, moq:[5,5,10,5,8,5,5,6][idx]||5,
      stock:[420,180,360,300,240,500,460,280][idx]||300, promo:[null,'Mua 20 thùng tặng 1',null,'Giảm thêm 2% từ 15 thùng',null,null,null,'Mua 10 tặng 1'][idx]};
  });
}
function wp(slug){return wprods().find(p=>p.slug===slug);}

/* ===================== ORDER STORAGE (schema GG Sheet) ===================== */
const OKEY='nv_dorders';
const DEMO='TNV-HCM-BT-00125';
const SEED=[
 {code:'DH-TNV-202607-00128',dealer:DEMO,date:'22/07/2026',ts:1753142400000,channel:'Cổng đại lý',total:87750000,paid:70000000,ship:'Đang giao',pay:'Công nợ 15 ngày',status:'shipping',staff:'Trần B',note:'Giao giờ hành chính',lines:[['tra-sam-dua',6]]},
 {code:'DH-TNV-202607-00121',dealer:DEMO,date:'14/07/2026',ts:1752460800000,channel:'Cổng đại lý',total:52400000,paid:52400000,ship:'Đã giao',pay:'Chuyển khoản',status:'done',staff:'Trần B',note:'',lines:[['oolong-tu-quy',4]]},
 {code:'DH-TNV-202607-00110',dealer:DEMO,date:'03/07/2026',ts:1751500800000,channel:'Chatbot',total:96200000,paid:96200000,ship:'Đã giao',pay:'Chuyển khoản',status:'done',staff:'Trần B',note:'Đặt qua chat',lines:[['tra-xanh-hoa-lai',8]]},
 {code:'DH-TNV-202606-00098',dealer:DEMO,date:'26/06/2026',ts:1750896000000,channel:'Cổng đại lý',total:41300000,paid:20000000,ship:'Chờ xử lý',pay:'Công nợ (quá hạn)',status:'debt',staff:'Trần B',note:'',lines:[['tra-gao-pha-che',3]]},
 {code:'DH-TNV-202605-00087',dealer:DEMO,date:'18/05/2026',ts:1747526400000,channel:'Cổng đại lý',total:63800000,paid:63800000,ship:'Đã giao',pay:'Chuyển khoản',status:'done',staff:'Trần B',note:'',lines:[['tra-lai-pha-che',5]]},
];
function allOrders(){let x;try{x=JSON.parse(localStorage.getItem(OKEY))}catch(e){}if(!x){x=SEED.slice();localStorage.setItem(OKEY,JSON.stringify(x));}return x;}
function dorders(){return allOrders().filter(o=>o.dealer===D.code);}   // moi dai ly chi thay don cua minh
function saveOrders(a){localStorage.setItem(OKEY,JSON.stringify(a));}
const OST={pending:['Chờ công ty duyệt','b-amber'],confirm:['Đã xác nhận','b-blue'],preparing:['Đang chuẩn bị hàng','b-blue'],shipping:['Đang giao hàng','b-blue'],done:['Hoàn tất','b-green'],debt:['Công nợ quá hạn','b-red'],cancelled:['Đã hủy','b-gray']};
function prodText(o){return o.lines.map(l=>{const p=wp(l[0]);return (p?p.name:l[0])+' ×'+l[1]+' thùng';}).join('; ');}
function qtyText(o){return o.lines.reduce((a,l)=>a+l[1],0)+' thùng';}

/* ===================== VOUCHERS (đại lý tự add mã) ===================== */
const VKEY='nv_dvcodes';
const VALID_CODES={   // pool mã hợp lệ (mô phỏng company GG Sheet Khuyến mãi)
 'TNV-CAP1-HCM':{off:0.03,label:'Giảm thêm 3%',cond:'Đơn từ 50 triệu · khu vực HCM',type:'Mã theo cấp đại lý'},
 'SALE-Q3-2026':{off:0.05,label:'Giảm 5%',cond:'Đơn từ 20 thùng · chiến dịch Quý 3',type:'Mã chiến dịch'},
 'TRANB-KD07':{off:0,ship:true,label:'Miễn phí vận chuyển',cond:'Mã của NV kinh doanh Trần B',type:'Mã theo nhân viên'},
 'TETNAIVANG':{off:0.07,label:'Giảm 7% Tết',cond:'Đơn từ 30 triệu · dịp Tết',type:'Mã dịp lễ'},
 'GIUCHAN10':{off:0.10,label:'Giảm 10% tri ân',cond:'Đại lý lâu chưa đặt hàng',type:'Mã giữ chân'},
};
function myCodes(){let x;try{x=JSON.parse(localStorage.getItem(VKEY))}catch(e){}if(!x){x=['TNV-CAP1-HCM','SALE-Q3-2026','TRANB-KD07'];localStorage.setItem(VKEY,JSON.stringify(x));}return x;}
function saveCodes(a){localStorage.setItem(VKEY,JSON.stringify(a));}
let appliedCode = null;   // mã đang áp cho giỏ

const VAT=0.08;
/* ===================== HELPERS ===================== */
const $=(s,r=document)=>r.querySelector(s);
function pct(a,b){return Math.min(100,Math.round(a/b*100));}
function cartD(){try{return JSON.parse(localStorage.getItem('nv_dcart'))||{}}catch(e){return {}}}
function saveCart(c){localStorage.setItem('nv_dcart',JSON.stringify(c));updateCartN();}
function updateCartN(){const n=Object.values(cartD()).reduce((a,b)=>a+(+b||0),0);$('#cartN').textContent=n;}
function toast(m){let t=document.createElement('div');t.textContent=m;t.style.cssText='position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#28321f;color:#fff;padding:12px 22px;border-radius:30px;font-size:13.5px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.2)';document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
/* tính tiền giỏ (dùng chung cart + chat) */
function calcTotals(lines){ // lines: [[slug,boxes],...]
  let sub=0,boxes=0; lines.forEach(l=>{const p=wp(l[0]);sub+=p.boxPrice*l[1];boxes+=l[1];});
  const vol = boxes>=20?Math.round(sub*0.02):0;
  let codeOff=0, freeship=false;
  if(appliedCode && VALID_CODES[appliedCode]){const c=VALID_CODES[appliedCode];codeOff=Math.round(sub*(c.off||0));if(c.ship)freeship=true;}
  const afterDisc=sub-vol-codeOff;
  const vat=Math.round(afterDisc*VAT);
  const ship = (freeship||afterDisc>=30000000)?0:350000;
  const grand=afterDisc+vat+ship;
  return {sub,boxes,vol,codeOff,afterDisc,vat,ship,grand};
}

/* xuất CSV chuẩn cột GG Sheet (mở bằng Excel) */
const GG_COLS=['Thời gian','Kênh','Trang','Tên khách','SĐT','Địa chỉ','Sản phẩm','Số lượng','Ghi chú','Trạng thái'];
function orderRow(o){return {'Thời gian':o.date,'Kênh':o.channel,'Trang':'Trà Nai Vàng B2B','Tên khách':D.name,'SĐT':D.phone,'Địa chỉ':D.addr+', '+D.district+', '+D.city,'Sản phẩm':prodText(o),'Số lượng':qtyText(o),'Ghi chú':o.note||'','Trạng thái':OST[o.status][0]};}
function csvEsc(v){v=String(v==null?'':v);return /[",\n;]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function downloadCSV(rows,filename){
  const head=GG_COLS.join(',');
  const body=rows.map(r=>GG_COLS.map(c=>csvEsc(r[c])).join(',')).join('\n');
  const blob=new Blob(['﻿'+head+'\n'+body],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
function exportOrderCSV(code){const o=dorders().find(x=>x.code===code);downloadCSV([orderRow(o)],'DonHang_'+code+'.csv');toast('Đã tải phiếu đơn '+code);}
function exportPeriod(year,month){
  const list=dorders().filter(o=>{const [d,m,y]=o.date.split('/');return (''+y)===(''+year)&&(month==='all'||(''+ +m)===(''+ +month));});
  downloadCSV(list.map(orderRow), 'DonHang_'+(month==='all'?'Nam'+year:('T'+month+'_'+year))+'.csv');
  toast('Đã xuất '+list.length+' đơn');
}

const TITLES={overview:'Tổng quan',products:'Đặt hàng sỉ',chat:'Đặt hàng qua chat',cart:'Giỏ hàng sỉ',orders:'Đơn hàng & lưu trữ',debt:'Thanh toán & công nợ',vouchers:'Ưu đãi & mã của tôi',target:'Mục tiêu & thưởng',reports:'Báo cáo mua hàng',profile:'Hồ sơ đại lý',support:'Hỗ trợ & khiếu nại'};
let cur='overview';
function go(p){cur=p;document.querySelectorAll('#dnav button[data-p]').forEach(b=>b.classList.toggle('on',b.dataset.p===p));$('#paneTitle').textContent=TITLES[p];$('#dbody').innerHTML=PANES[p]();bindPane(p);window.scrollTo(0,0);}
function bindPane(p){
  if(p==='products'||p==='cart'){const gc=$('#goCart');if(gc)gc.onclick=()=>go('cart');const po=$('#placeOrder');if(po)po.onclick=placeOrder;const ac=$('#applyCode');if(ac)ac.onclick=()=>{const v=$('#cCode').value.trim().toUpperCase();applyCartCode(v);};}
  if(p==='orders'){$('#fYear').onchange=renderOrders;$('#fMonth').onchange=renderOrders;$('#oFilter').addEventListener('click',e=>{const b=e.target.closest('[data-f]');if(!b)return;document.querySelectorAll('#oFilter [data-f]').forEach(x=>x.classList.toggle('on',x===b));renderOrders();});$('#expPeriod').onclick=()=>exportPeriod($('#fYear').value,$('#fMonth').value);renderOrders();}
  if(p==='vouchers'){$('#btnAddCode').onclick=addCodeUI;}
  if(p==='support'){$('#sBtn').onclick=sendTicket;}
  if(p==='chat'){initChat();}
}
$('#dbody').addEventListener('click',e=>{const pl=e.target.closest('[data-pl]'),m=e.target.closest('[data-m]'),rm=e.target.closest('[data-rm]');if(pl)chg(pl.dataset.pl,1);else if(m)chg(m.dataset.m,-1);else if(rm)setQty(rm.dataset.rm,0);});
$('#dbody').addEventListener('change',e=>{const i=e.target.closest('[data-i]');if(i)setQty(i.dataset.i,Math.max(0,parseInt(i.value)||0));});
function chg(slug,d){const c=cartD();setQty(slug,Math.max(0,(+c[slug]||0)+d));}
function setQty(slug,v){const c=cartD();if(v>0)c[slug]=v;else delete c[slug];saveCart(c);const inp=document.getElementById('q-'+slug);if(inp)inp.value=v;if(cur==='cart')go('cart');}

/* --- codes --- */
function applyCartCode(code){if(!code){appliedCode=null;go('cart');return;}if(VALID_CODES[code]){appliedCode=code;if(myCodes().indexOf(code)<0){const a=myCodes();a.push(code);saveCodes(a);}toast('Đã áp mã '+code);}else{toast('Mã không hợp lệ hoặc không áp dụng');}go('cart');}
function addCodeUI(){const v=$('#addCode').value.trim().toUpperCase();if(!v)return;if(!VALID_CODES[v]){toast('Mã "'+v+'" không hợp lệ');return;}const a=myCodes();if(a.indexOf(v)>=0){toast('Mã đã có trong ví');return;}a.push(v);saveCodes(a);toast('Đã thêm mã '+v);go('vouchers');}
function useCode(code){appliedCode=code;toast('Sẽ áp mã '+code+' khi đặt hàng');go('cart');}

/* --- orders table --- */
function renderOrders(){
  const y=$('#fYear').value, mo=$('#fMonth').value;
  const fBtn=document.querySelector('#oFilter [data-f].on'), f=fBtn?fBtn.dataset.f:'all';
  let list=dorders().filter(o=>{const [d,m,yy]=o.date.split('/');return yy===y&&(mo==='all'||(''+ +m)===(''+ +mo));});
  if(f!=='all')list=list.filter(o=> f==='pending'?['pending','confirm','preparing'].includes(o.status):o.status===f);
  $('#oBody').innerHTML=list.length?list.map(o=>`<tr><td><b>${o.code}</b><br/><small style="color:var(--stone)">${prodText(o)}</small></td><td>${o.date}</td><td><span class="badge ${o.channel==='Chatbot'?'b-green':'b-blue'}">${o.channel}</span></td><td class="tr">${fmt(o.total)}</td><td class="tr" style="color:${o.total-o.paid>0?'#b23b2a':'#3c6b28'}">${fmt(o.total-o.paid)}</td><td><span class="badge ${OST[o.status][1]}">${OST[o.status][0]}</span><br/><small style="color:var(--stone)">${o.ship}</small></td><td><button class="btn btn-ghost btn-sm" onclick="exportOrderCSV('${o.code}')">⤓ CSV</button> <button class="btn btn-ghost btn-sm" onclick="printOrder('${o.code}')">🖨 PDF</button></td></tr>`).join(''):`<tr><td colspan="7" class="empty">Không có đơn trong kỳ/trạng thái này.</td></tr>`;
}

/* --- place order (manual) --- */
function makeOrder(lines,channel,note){
  const t=calcTotals(lines);
  const code='DH-TNV-'+new Date().toISOString().slice(0,7).replace('-','')+'-'+Math.floor(Math.random()*900+100);
  const o={code,dealer:D.code,date:new Date().toLocaleDateString('vi-VN'),ts:Date.now(),channel,total:t.grand,paid:0,ship:'Chờ duyệt',pay:'Chờ thanh toán',status:'pending',staff:(D.staff||'NV').split('—')[0].trim(),note:note||'',lines:lines.slice()};
  const all=allOrders();all.unshift(o);saveOrders(all);
  ggSync(o);
  appliedCode=null; localStorage.removeItem('nv_dcart'); updateCartN();
  return o;
}
function placeOrder(){
  const c=cartD(), lines=Object.keys(c).filter(s=>c[s]>0).map(s=>[s,c[s]]);
  if(!lines.length){toast('Giỏ trống');return;}
  const o=makeOrder(lines,'Cổng đại lý',$('#wNote')?$('#wNote').value.trim():'');
  toast('Đã chốt đơn '+o.code+' · đồng bộ GG Sheets ✓');
  go('orders');
}
function payDebt(code,amt){if(confirm('Thanh toán công nợ đơn '+code+' số tiền '+fmt(amt)+'?')){D.creditUsed=Math.max(0,D.creditUsed-amt);saveDealer(D);toast('Đã ghi nhận thanh toán '+fmt(amt));go('debt');}}
function sendTicket(){const ty=$('#sType').value,m=$('#sMsg').value.trim();if(m.length<5){toast('Nhập nội dung');return;}const id='HT-'+Math.floor(Math.random()*90000+10000);$('#ticketList').innerHTML=`<div class="alert info"><span>🎫</span><div><b>${id}</b> · ${ty}<br/><small>Đã tiếp nhận · Phụ trách ${D.staff}. Phản hồi trong 24h · xác nhận email ${D.email}.</small></div></div>`+$('#ticketList').innerHTML;$('#sMsg').value='';}

/* ===================== CHATBOT ĐẶT HÀNG ===================== */
let chat={step:'menu',lines:[],pend:null};
function initChat(){chat={step:'menu',lines:[],pend:null};$('#chatLog').innerHTML='';$('#chatSend').onclick=()=>chatUser($('#chatIn').value);$('#chatIn').onkeydown=e=>{if(e.key==='Enter')chatUser($('#chatIn').value);};
  botSay('Dạ em chào Anh/Chị đại lý '+D.name+' ạ! 🌿 Em là trợ lý đặt hàng sỉ tự động của Nai Vàng. Anh/Chị muốn đặt sản phẩm nào ạ? Chọn nhanh bên dưới hoặc gõ tin nhắn nhé.');
  showProductChips();
}
function botSay(t){const d=document.createElement('div');d.className='msg bot';d.textContent=t;$('#chatLog').appendChild(d);$('#chatLog').scrollTop=1e9;}
function meSay(t){const d=document.createElement('div');d.className='msg me';d.textContent=t;$('#chatLog').appendChild(d);$('#chatLog').scrollTop=1e9;}
function chips(items){const w=$('#chatChips');w.innerHTML='';items.forEach(it=>{const b=document.createElement('button');b.textContent=it.t;b.onclick=it.fn;w.appendChild(b);});}
function showProductChips(){chips(wprods().map(p=>({t:p.name,fn:()=>pickProduct(p.slug)})).concat([{t:'💰 Hỏi giá',fn:()=>chatUser('giá')},{t:'🎁 Khuyến mãi',fn:()=>chatUser('khuyến mãi')},{t:'🚚 Giao hàng',fn:()=>chatUser('giao hàng')}]));}
function pickProduct(slug){const p=wp(slug);chat.pend=slug;chat.step='qty';meSay('Đặt '+p.name);botSay('Dạ '+p.name+' giá sỉ '+fmt(p.whole)+'/hộp, '+fmt(p.boxPrice)+'/thùng ('+p.perBox+' hộp). Anh/Chị lấy mấy thùng ạ? (tối thiểu '+p.moq+' thùng)');chips([{t:p.moq+' thùng',fn:()=>addLine(slug,p.moq)},{t:'10 thùng',fn:()=>addLine(slug,10)},{t:'20 thùng',fn:()=>addLine(slug,20)}]);}
function addLine(slug,qty){const p=wp(slug);meSay(qty+' thùng');const ex=chat.lines.find(l=>l[0]===slug);if(ex)ex[1]+=qty;else chat.lines.push([slug,qty]);chat.step='more';botSay('Dạ em ghi nhận '+p.name+' ×'+qty+' thùng ✅. Anh/Chị thêm sản phẩm khác hay chốt đơn ạ?');chips([{t:'➕ Thêm sản phẩm',fn:()=>{chat.step='menu';botSay('Anh/Chị chọn thêm sản phẩm ạ:');showProductChips();}},{t:'✅ Chốt đơn',fn:reviewOrder}]);}
function reviewOrder(){if(!chat.lines.length){botSay('Dạ Anh/Chị chưa chọn sản phẩm nào ạ.');return;}const t=calcTotals(chat.lines);chat.step='confirm';
  botSay('📋 Đơn của mình:\n'+chat.lines.map(l=>{const p=wp(l[0]);return '• '+p.name+' ×'+l[1]+' thùng = '+fmt(p.boxPrice*l[1]);}).join('\n')+'\n\nTạm tính: '+fmt(t.sub)+(t.vol?'\nChiết khấu sản lượng: −'+fmt(t.vol):'')+(t.codeOff?'\nMã '+appliedCode+': −'+fmt(t.codeOff):'')+'\nVAT 8%: '+fmt(t.vat)+'\nPhí ship: '+(t.ship?fmt(t.ship):'Miễn phí')+'\n💰 Tổng: '+fmt(t.grand));
  botSay('Anh/Chị xác nhận chốt đơn ạ? Em sẽ gửi về hệ thống sản xuất luôn.');
  chips([{t:'🏷️ Áp mã giảm giá',fn:askCode},{t:'✅ Chốt đơn',fn:confirmChatOrder},{t:'✏️ Đặt lại',fn:initChat}]);
}
function askCode(){chat.step='code';botSay('Dạ Anh/Chị nhập mã giảm giá vào ô chat rồi gửi giúp em ạ (vd: SALE-Q3-2026).');chips(myCodes().map(c=>({t:c,fn:()=>{applyChatCode(c);}})));}
function applyChatCode(code){code=code.trim().toUpperCase();if(VALID_CODES[code]){appliedCode=code;if(myCodes().indexOf(code)<0){const a=myCodes();a.push(code);saveCodes(a);}meSay('Mã '+code);botSay('Dạ đã áp mã '+code+' ('+VALID_CODES[code].label+') ✅');}else{meSay(code);botSay('Dạ mã "'+code+'" không hợp lệ ạ 🙏');}reviewOrder();}
function confirmChatOrder(){const o=makeOrder(chat.lines,'Chatbot','Đặt & chốt qua chat');botSay('🎉 Dạ em đã chốt đơn '+o.code+' cho mình!\n☁️ Đơn đã tự động cập nhật về Google Sheets công ty — bộ phận sản xuất sẽ xuất hàng.\nTổng: '+fmt(o.total)+'. Anh/Chị vào mục "Đơn hàng & lưu trữ" để tải phiếu lưu nhé ạ. Cảm ơn Anh/Chị! 🌿');chips([{t:'📄 Xem đơn hàng',fn:()=>go('orders')},{t:'🛒 Đặt đơn mới',fn:initChat}]);chat.step='done';}
/* trả lời từ khoá (mô phỏng Template GG Sheet) */
function chatUser(txt){txt=(txt||'').trim();if(!txt)return;$('#chatIn').value='';meSay(txt);const q=norm(txt);
  if(chat.step==='code'){applyChatCode(txt);return;}
  var ph=(window.NVLead)?NVLead.detectPhone(txt):((txt.replace(/[.\s]/g,'').match(/0\d{8,10}/)||[])[0]);
  if(ph){ if(window.NVLead)NVLead.save(ph,D.email||'','Chatbot đại lý'); botSay('Dạ em đã ghi nhận số '+ph+' ✅ — Nai Vàng sẽ gửi poster, ưu đãi & sự kiện qua Zalo/Email cho mình ạ 🎁. Anh/Chị cần đặt sản phẩm nào không ạ?'); showProductChips(); return; }
  const prod=wprods().find(p=>norm(p.name).includes(q)||q.includes(norm(p.name).split(' ')[0]));
  if(/dat|chot|mua|order|lay/.test(q)&&prod){pickProduct(prod.slug);return;}
  if(prod){pickProduct(prod.slug);return;}
  if(/gia|bao nhieu|nhieu tien/.test(q)){botSay('Dạ bảng giá sỉ theo cấp '+D.tier+' ạ:\n'+wprods().slice(0,4).map(p=>'• '+p.name+': '+fmt(p.whole)+'/hộp').join('\n')+'\n… Anh/Chị chọn sản phẩm bên dưới để em báo giá thùng ạ 🌿');showProductChips();return;}
  if(/khuyen mai|giam gia|ma giam|uu dai|voucher|sale/.test(q)){botSay('Dạ đại lý mình đang có các mã: '+myCodes().join(', ')+' 🎁. Khi chốt đơn em áp mã có lợi nhất cho mình ạ!');showProductChips();return;}
  if(/ship|giao hang|van chuyen|bao lau/.test(q)){botSay('Dạ giao hàng toàn quốc, đơn từ 30 triệu MIỄN PHÍ ship ạ 🚚. Nội thành 1-2 ngày, tỉnh 2-4 ngày.');return;}
  if(/cod|cong no|thanh toan/.test(q)){botSay('Dạ đại lý mình được hạn mức công nợ '+fmt(D.creditLimit)+', hỗ trợ chuyển khoản/QR/COD ạ.');return;}
  if(/chao|hello|hi|alo/.test(q)){botSay('Dạ em chào Anh/Chị ạ! 🌿 Anh/Chị muốn đặt sản phẩm nào ạ?');showProductChips();return;}
  botSay('Dạ Anh/Chị chọn sản phẩm bên dưới để em lên đơn, hoặc gõ "giá", "khuyến mãi", "giao hàng" để em hỗ trợ nhé ạ 🥰');showProductChips();
}

/* header + init */
$('#dName').textContent=D.name;$('#dCode').textContent=D.code;$('#dAva').textContent=(D.rep||'A').trim()[0].toUpperCase();
$('#dLogout').onclick=()=>{if(confirm('Đăng xuất cổng đại lý?'))location.href='dang-nhap-dai-ly.html';};
$('#dnav').addEventListener('click',e=>{const b=e.target.closest('button[data-p]');if(b)go(b.dataset.p);});
/* BANNER ưu đãi đại lý (admin sửa được qua nv_dealer_promo) */
function dealerPromo(){var d;try{d=JSON.parse(localStorage.getItem('nv_dealer_promo'))}catch(e){}return d||{tag:'Ưu đãi đại lý tháng '+(new Date().getMonth()+1)+'/'+new Date().getFullYear(),title:'Chiết khấu thêm +3% cho đơn từ 50 triệu',text:'Freeship đơn từ 30 triệu · Tích điểm ×2 · Thưởng 2% khi đạt mục tiêu tháng · Quà tặng cho đơn đầu tiên trong tháng.'};}
function renderPromo(){var el=$('#dPromo');if(sessionStorage.getItem('dpromo_hide')){el.innerHTML='';return;}var p=dealerPromo();
  el.innerHTML='<div class="dpromo"><div class="in"><button class="x" id="promoX" aria-label="Ẩn">×</button><div><span class="tag">'+p.tag+'</span><h2>'+p.title+'</h2><p>'+p.text+'</p><div class="act"><button class="b1" id="promoV">Xem mã ưu đãi &amp; chính sách</button><button class="b2" id="promoC">Đặt hàng ngay</button></div></div></div></div>';
  $('#promoX').onclick=function(){sessionStorage.setItem('dpromo_hide','1');renderPromo();};
  $('#promoV').onclick=function(){go('vouchers');};$('#promoC').onclick=function(){go('products');};}
updateCartN();renderPromo();go('overview');
</script>
</body>
</html>
