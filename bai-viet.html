const ART=[{"slug": "pha-oolong-dung-cach", "cat": "Cách pha", "catk": "cach-pha", "title": "Pha trà oolong đúng cách để giữ trọn hương", "cover": "assets/real/know-2.jpg", "date": "15/07/2026", "excerpt": "Nhiệt độ, thời gian và tỉ lệ — ba yếu tố quyết định một ấm oolong ngon.", "body": "<p>Oolong là dòng trà lên men bán phần, hương thơm tinh tế và hậu ngọt sâu. Để pha ngon, hãy chú ý ba yếu tố:</p><h3>1. Nhiệt độ nước</h3><p>Dùng nước 85–95°C. Nước quá sôi có thể làm trà bị chát và mất hương.</p><h3>2. Tỉ lệ &amp; thời gian</h3><p>8–10g trà cho 150ml nước, hãm 20–30 giây cho lần đầu, tăng dần cho các lần sau. Oolong pha được 3–4 lần nước.</p><h3>3. Tráng ấm</h3><p>Tráng ấm và trà bằng nước sôi trước khi pha để đánh thức hương.</p>"}, {"slug": "ca-gai-leo-tia-to", "cat": "Sức khỏe", "catk": "suc-khoe", "title": "Cà gai leo tía tô và câu chuyện chăm sóc sức khỏe", "cover": "assets/real/products/ca-gai-leo-tia-to.jpg", "date": "12/07/2026", "excerpt": "Vì sao thảo mộc Việt ngày càng được ưa chuộng trong lối sống lành mạnh.", "body": "<p>Cà gai leo và lá tía tô là những thảo mộc quen thuộc trong đời sống người Việt. Kết hợp cùng cỏ ngọt, sản phẩm mang vị dịu, dễ uống hằng ngày.</p><p><b>Lưu ý:</b> sản phẩm là thực phẩm, không phải thuốc và không thay thế thuốc chữa bệnh. Dùng theo khuyến nghị trên bao bì.</p><h3>Cách dùng</h3><p>Dùng 1 túi lọc với 200–300ml nước nóng ~100°C, ngâm 5–10 phút.</p>"}, {"slug": "tra-sam-dua-ky-uc", "cat": "Văn hóa", "catk": "van-hoa", "title": "Trà sâm dứa — hương vị ký ức của người Việt", "cover": "assets/real/products/tra-sam-dua.jpg", "date": "08/07/2026", "excerpt": "Từ ly trà đá vỉa hè đến bàn tiệc sang trọng, một hương vị đi cùng năm tháng.", "body": "<p>Trà sâm dứa gắn liền với ký ức của nhiều thế hệ — hương lá dứa dịu ngọt quyện trong trà xanh. Đây là một trong những dòng bán chạy nhất của Nai Vàng.</p><p>Thưởng thức nóng hoặc pha lạnh đều ngon, thích hợp đãi khách và làm quà biếu.</p>"}, {"slug": "vung-tra-bao-loc", "cat": "Nguyên liệu", "catk": "nguyen-lieu", "title": "Cao nguyên Bảo Lộc — cái nôi của trà Việt", "cover": "assets/real/terroir.jpg", "date": "03/07/2026", "excerpt": "Độ cao, khí hậu và thổ nhưỡng làm nên chất trà đặc trưng của Lâm Đồng.", "body": "<p>Ở độ cao 800–1.000m, sương phủ quanh năm và đất bazan màu mỡ, Bảo Lộc là vùng trà trứ danh. Búp trà lớn chậm, tích lũy hương và vị đậm đà.</p><p>Nai Vàng tuyển nguyên liệu từ chính vùng đất này để giữ trọn bản sắc trà cao nguyên.</p>"}, {"slug": "nghe-thuat-thuong-tra", "cat": "Văn hóa", "catk": "van-hoa", "title": "Nghệ thuật thưởng trà của người Việt", "cover": "assets/real/know-3.jpg", "date": "28/06/2026", "excerpt": "Thưởng trà không chỉ là uống — đó là một khoảnh khắc chậm lại giữa đời sống.", "body": "<p>Thưởng trà là nét văn hóa lâu đời. Một ấm trà ngon cần sự tĩnh tại, từ khâu chọn trà, đun nước đến rót mời.</p><p>Hãy dành cho mình vài phút mỗi ngày bên tách trà Nai Vàng để cân bằng nhịp sống.</p>"}, {"slug": "nai-vang-ocop", "cat": "Tin công ty", "catk": "tin-cong-ty", "title": "Trà Nai Vàng đạt chứng nhận OCOP 3 sao", "cover": "assets/real/cert-ocop.jpg", "date": "20/06/2026", "excerpt": "Cột mốc khẳng định chất lượng và uy tín của thương hiệu trà Bảo Lộc.", "body": "<p>Sản phẩm Trà Nai Vàng vinh dự đạt chứng nhận OCOP 3 sao — chương trình “Mỗi xã một sản phẩm”, bên cạnh chứng nhận an toàn thực phẩm FSSC 22000.</p><p>Đây là động lực để Nai Vàng tiếp tục nâng cao chất lượng và mở rộng hệ thống phân phối.</p>"}];
