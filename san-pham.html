<style>
  :root{
    --tea:#5E7C3E;--tea-2:#4A6B2F;--forest:#2F4A24;--pine:#38562A;--sage:#7E9B54;--sage-100:#E7EEDA;
    --gold:#B39247;--gold-2:#977A38;--gold-light:#D9BE7E;--cream:#FBFCF7;--off:#F2F5EA;--paper:#FFFFFF;
    --ink:#28321F;--stone:#6E7563;--line:rgba(40,50,31,.13);--line-soft:rgba(40,50,31,.07);
    --shadow:0 34px 70px -34px rgba(40,60,26,.35);--shadow-soft:0 20px 44px -26px rgba(40,60,26,.28);
    --maxw:1260px;--serif:'Fraunces',Georgia,serif;--sans:'Be Vietnam Pro',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--cream);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  h1,h2,h3,h4{font-family:var(--serif);font-weight:500;line-height:1.1;letter-spacing:-.01em}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:var(--tea);display:inline-flex;align-items:center;gap:12px}
  .eyebrow::before{content:"";width:24px;height:1px;background:var(--gold);display:inline-block}
  .btn{display:inline-flex;align-items:center;gap:9px;cursor:pointer;border:none;font-family:var(--sans);font-weight:600;font-size:14px;padding:15px 30px;border-radius:40px;transition:all .3s cubic-bezier(.2,.7,.2,1)}
  .btn-primary{background:var(--tea);color:#fff}
  .btn-primary:hover{background:var(--tea-2);transform:translateY(-2px);box-shadow:0 16px 30px -12px rgba(94,124,62,.6)}

  .announce{background:var(--sage-100);color:var(--forest);font-size:12.5px;letter-spacing:.03em;text-align:center;padding:9px 16px}
  .announce b{color:var(--gold-2);font-weight:600}

  header{position:sticky;top:0;z-index:60;background:rgba(251,252,247,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-soft)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:82px}
  .brand{display:flex;align-items:center;gap:13px}
  .brand img{height:56px;width:auto}
  .brand .wm{display:flex;flex-direction:column;line-height:1}
  .brand .wm b{font-family:var(--serif);font-weight:600;font-size:19px;letter-spacing:.03em;color:var(--forest)}
  .brand .wm span{font-size:9px;letter-spacing:.4em;color:var(--gold-2);text-transform:uppercase;margin-top:4px}
  .menu{display:flex;gap:32px;list-style:none}
  .menu a{font-size:14px;font-weight:500;position:relative;padding:6px 0;opacity:.85}
  .menu a::after{content:"";position:absolute;left:0;bottom:0;width:0;height:1.5px;background:var(--tea);transition:width .3s}
  .menu a:hover{opacity:1}.menu a:hover::after{width:100%}
  .menu a.active{opacity:1;color:var(--tea)}.menu a.active::after{width:100%}
  .nav-actions{display:flex;align-items:center;gap:18px}
  .icon-btn{width:22px;height:22px;color:var(--ink);opacity:.8;cursor:pointer;position:relative}
  .burger{display:none;flex-direction:column;gap:5px;cursor:pointer;width:26px}
  .burger span{height:1.6px;background:var(--ink);width:100%}

  /* page head */
  .phead{background:linear-gradient(180deg,var(--sage-100),var(--cream));padding:44px 0 30px}
  .crumb{font-size:12.5px;color:var(--stone);margin-bottom:14px}
  .crumb a:hover{color:var(--tea)}
  .crumb b{color:var(--tea);font-weight:500}
  .phead h1{font-size:clamp(32px,4.4vw,52px);font-weight:400}
  .phead p{color:var(--stone);margin-top:10px;max-width:560px}

  /* toolbar */
  .toolbar{display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin:34px 0 18px}
  .search{flex:1;min-width:240px;max-width:420px;position:relative}
  .search input{width:100%;padding:13px 18px 13px 46px;border:1px solid var(--line);border-radius:40px;font-family:var(--sans);font-size:14px;background:var(--paper);transition:border .2s}
  .search input:focus{outline:none;border-color:var(--tea);box-shadow:0 0 0 3px rgba(94,124,62,.12)}
  .search svg{position:absolute;left:17px;top:50%;transform:translateY(-50%);width:18px;color:var(--stone)}
  .sort{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--stone)}
  .sort select{padding:12px 16px;border:1px solid var(--line);border-radius:40px;font-family:var(--sans);font-size:13.5px;background:var(--paper);color:var(--ink);cursor:pointer}
  .sort select:focus{outline:none;border-color:var(--tea)}

  /* chips */
  .chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:36px}
  .chip{padding:10px 20px;border-radius:40px;border:1px solid var(--line);background:var(--paper);font-size:13.5px;font-weight:500;color:var(--ink);cursor:pointer;transition:all .25s}
  .chip:hover{border-color:var(--tea);color:var(--tea)}
  .chip.on{background:var(--tea);border-color:var(--tea);color:#fff}
  .chip small{opacity:.65;font-weight:400;margin-left:4px}

  .count{font-size:13.5px;color:var(--stone);margin-bottom:18px}
  .count b{color:var(--tea)}

  /* grid & cards */
  .prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px;padding-bottom:70px}
  .card{background:var(--paper);border:1px solid var(--line-soft);border-radius:16px;overflow:hidden;transition:transform .4s cubic-bezier(.2,.7,.2,1),box-shadow .4s,opacity .3s}
  .card:hover{transform:translateY(-7px);box-shadow:var(--shadow-soft)}
  .card .thumb{position:relative;background:#fff;overflow:hidden;cursor:pointer}
  .card .thumb img{width:100%;aspect-ratio:1/1;object-fit:cover;transition:transform .6s}
  .card:hover .thumb img{transform:scale(1.05)}
  .tag{position:absolute;top:14px;left:14px;z-index:2;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;background:var(--tea);color:#fff;font-weight:600;padding:5px 11px;border-radius:20px}
  .tag.gold{background:var(--gold-light);color:#4a3d16}
  .wish{position:absolute;top:12px;right:12px;z-index:2;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.92);border:1px solid var(--line-soft);display:grid;place-items:center;color:var(--stone);cursor:pointer;transition:all .25s}
  .wish:hover{color:#c0392b;transform:scale(1.1)}
  .wish.on{color:#c0392b}
  .card .body{padding:20px 20px 24px}
  .card .cat{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-2);font-weight:600}
  .card h3{font-size:18px;margin:7px 0 12px;font-weight:500;cursor:pointer}
  .card h3:hover{color:var(--tea)}
  .card .row{display:flex;align-items:center;justify-content:space-between}
  .card .price{font-family:var(--serif);font-size:18px;font-weight:500;color:var(--tea)}
  .card .price s{color:var(--stone);font-size:13px;font-weight:400;margin-right:7px}
  .card .add{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;transition:all .25s;color:var(--tea);background:var(--paper)}
  .card .add:hover{background:var(--tea);color:#fff;border-color:var(--tea)}
  .empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--stone)}
  .empty b{display:block;font-family:var(--serif);font-size:22px;color:var(--ink);margin-bottom:8px;font-weight:500}

  /* toast */
  .toast{position:fixed;left:50%;bottom:30px;transform:translate(-50%,20px);background:var(--forest);color:#fff;padding:13px 26px;border-radius:40px;font-size:14px;box-shadow:0 16px 40px -12px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:all .35s;z-index:99;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translate(-50%,0)}
  .toast svg{width:17px;color:var(--gold-light)}

  /* newsletter + footer (đồng bộ Home) */
  .news{background:var(--sage-100);text-align:center;padding:clamp(64px,8vw,100px) 0}
  .news h2{font-size:clamp(26px,3.4vw,40px);margin:0 0 12px;font-weight:400}
  .news p{color:var(--stone);margin-bottom:26px}
  .news form{display:flex;gap:10px;max-width:460px;margin:0 auto}
  .news input{flex:1;padding:15px 18px;border:1px solid var(--line);border-radius:40px;font-family:var(--sans);font-size:14px;background:var(--paper)}
  .news input:focus{outline:2px solid var(--tea);outline-offset:1px;border-color:transparent}
  footer{background:#1E2E16;color:rgba(238,242,226,.72);padding:70px 0 26px}
  .foot-grid{display:grid;grid-template-columns:1.7fr 1fr 1fr 1.2fr;gap:40px;padding-bottom:48px;border-bottom:1px solid rgba(255,255,255,.09)}
  .foot-brand img{height:66px;margin-bottom:18px}
  .foot-brand p{font-size:14px;margin-bottom:18px;max-width:320px;font-weight:300}
  .fcol h4{font-family:var(--sans);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-light);margin-bottom:18px;font-weight:600}
  .fcol a,.fcol p{display:block;font-size:13.5px;padding:5px 0;color:rgba(238,242,226,.7);font-weight:300}
  .fcol a:hover{color:#fff}
  .fcol .lbl{color:var(--gold-light);font-weight:500}
  .foot-bottom{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;padding-top:24px;font-size:12.5px;color:rgba(238,242,226,.5)}

  .fab{position:fixed;right:20px;bottom:22px;z-index:80;display:flex;flex-direction:column;gap:12px}
  .fab a,.fab button{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:grid;place-items:center;box-shadow:0 10px 24px -8px rgba(0,0,0,.4);transition:transform .25s;color:#fff}
  .fab a:hover,.fab button:hover{transform:scale(1.08)}
  .fab .zalo{background:#0068ff;font-weight:700;font-size:13px;font-family:var(--sans)}
  .fab .phone{background:var(--tea)}
  .fab .mess{background:linear-gradient(45deg,#00b2ff,#a033ff)}
  .fab .top{background:var(--gold-light);color:#4a3d16}

  @media(max-width:1080px){.prod-grid{grid-template-columns:repeat(3,1fr)}.foot-grid{grid-template-columns:1fr 1fr}.foot-brand{grid-column:1/-1}}
  @media(max-width:860px){.menu{display:none}.burger{display:flex}.prod-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.prod-grid{grid-template-columns:1fr 1fr;gap:14px}.news form{flex-direction:column}.toolbar{flex-direction:column;align-items:stretch}.search{max-width:none}.card .body{padding:14px 14px 18px}.card h3{font-size:15.5px}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<section class="phead">

    <div class="crumb"><a href="index.html" data-i18n="crumb.home">Trang chủ</a> &nbsp;›&nbsp; <b data-i18n="nav.products">Sản phẩm</b></div>

<div class="wrap">
  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="q" type="search" data-i18n-ph="cl.search" placeholder="Tìm trà… (vd: sâm dứa, oolong, jasmine)" aria-label="Search"/>

    <p data-i18n="hm.newsP">Đăng ký để nhận ưu đãi thành viên và những chia sẻ về nghệ thuật thưởng trà.</p>

<script>
/* Dữ liệu SP + giỏ hàng dùng chung từ assets/store.js?v=170736 */
let state = {cat:'all', q:'', sort:'featured'};
/* wrap toggleWish để re-render tim */
const _tw = toggleWish; toggleWish = s => { _tw(s); renderGrid(); };

/* chips */
const chipsEl = document.getElementById('chips');
function renderChips(){
  const counts = {all: RETAIL.length};
  RETAIL.forEach(p=>counts[p.cat]=(counts[p.cat]||0)+1);
  let html = `<button class="chip ${state.cat==='all'?'on':''}" data-cat="all">${t('cat.all')} <small>${counts.all}</small></button>`;
  for(const k of Object.keys(CATS)){ if(!counts[k]) continue;
    html += `<button class="chip ${state.cat===k?'on':''}" data-cat="${k}">${catName(k)} <small>${counts[k]}</small></button>`; }
  chipsEl.innerHTML = html;
}
chipsEl.addEventListener('click', e=>{
  const b = e.target.closest('.chip'); if(!b) return;
  state.cat = b.dataset.cat; renderChips(); renderGrid();
});

/* grid */
const grid = document.getElementById('grid');
function renderGrid(){
  let list = RETAIL.filter(p => (state.cat==='all'||p.cat===state.cat) && (!state.q || searchText(p).includes(norm(state.q))));
  if(state.sort==='price-asc') list.sort((a,b)=>a.price-b.price);
  if(state.sort==='price-desc') list.sort((a,b)=>b.price-a.price);
  if(state.sort==='name') list.sort((a,b)=>prodName(a).localeCompare(prodName(b),getLang()==='en'?'en':'vi'));
  document.getElementById('count').innerHTML = `${t('cl.showing')} <b>${list.length}</b> ${t('cl.products')}${state.cat!=='all'?' · '+catName(state.cat):''}${state.q?` · ${t('cl.kw')} "<b>${state.q}</b>"`:''}`;
  if(!list.length){
    grid.innerHTML = `<div class="empty"><b>${t('cl.emptyT')}</b>${t('cl.emptyS')}</div>`;
    return;
  }
  grid.innerHTML = list.map(p=>`
    <article class="card">
      <div class="thumb">
        ${p.tag?`<span class="tag ${p.tag==='Cao cấp'?'gold':''}">${tagName(p.tag)}</span>`:''}
        <button class="wish ${wishlist.has(p.slug)?'on':''}" data-w="${p.slug}" aria-label="Wishlist">
          <svg viewBox="0 0 24 24" width="17" fill="${wishlist.has(p.slug)?'currentColor':'none'}" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2 4 4 0 0 1 7 2c0 5.5-7 10-7 10Z"/></svg>
        </button>
        <a href="chi-tiet-san-pham.html?sp=${p.slug}"><img src="assets/real/products/${p.slug}.jpg" alt="${prodName(p)}" loading="lazy"/></a>
      </div>
      <div class="body">
        <span class="cat">${catName(p.cat)}</span>
        <h3><a href="chi-tiet-san-pham.html?sp=${p.slug}">${prodName(p)}</a></h3>
        <div class="row">
          <div class="price">${p.old?`<s>${fmt(p.old)}</s>`:''}${fmt(p.price)}</div>
          <button class="add" data-add="${p.slug}" aria-label="${t('pd.addCart')}"><svg viewBox="0 0 24 24" width="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M2.4 3.2h2.3l1.75 10a1.7 1.7 0 0 0 1.68 1.4h8.75a1.7 1.7 0 0 0 1.66-1.32L20.6 6H5.3"/><circle cx="9.3" cy="19.1" r="1.75"/><circle cx="16.7" cy="19.1" r="1.75"/></svg></button>
        </div>
      </div>
    </article>`).join('');
}
grid.addEventListener('click', e=>{
  const add = e.target.closest('[data-add]');
  if(add){ addCart(add.dataset.add); return; }
  const w = e.target.closest('[data-w]');
  if(w){ toggleWish(w.dataset.w); }
});

/* search + sort */
document.getElementById('q').addEventListener('input', e=>{ state.q = e.target.value.trim(); renderGrid(); });
document.getElementById('sortSel').addEventListener('change', e=>{ state.sort = e.target.value; renderGrid(); });

/* nhan tham so tu email/nut Ap dung ngay/tim kiem trang chu */
const _prm=new URLSearchParams(location.search);
if(_prm.get('ap')) applyVoucher(_prm.get('ap'));
if(_prm.get('q')){ state.q=_prm.get('q'); document.getElementById('q').value=state.q; }
renderChips(); renderGrid(); updateBadge();
</script>
