<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đăng nhập đại lý — Trà Nai Vàng</title><meta name="description" content="Cổng đăng nhập dành cho đại lý &amp; nhà phân phối Trà Nai Vàng."/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css?v=170730"><script src="assets/i18n.js?v=170730"></script><script src="assets/store.js?v=170730"></script>
</head><body data-page="dang-nhap-dai-ly">
<main class="auth" style="min-height:calc(100vh - 240px);display:grid;place-items:center;padding:50px 20px;position:relative">
 <div class="acard" style="position:relative;z-index:2;width:100%;max-width:420px;background:var(--paper);border:1px solid var(--line-soft);border-radius:20px;box-shadow:var(--shadow);padding:36px 34px">
  <img src="assets/logo-full.png" alt="Nai Vàng" style="width:60px;margin:0 auto 14px;display:block"/>
  <h1 style="font-size:23px;font-weight:500;text-align:center">Cổng đại lý Nai Vàng</h1>
  <p style="font-size:13px;color:var(--stone);text-align:center;margin:6px 0 22px">Đăng nhập để xem bảng giá riêng, đặt hàng và theo dõi công nợ</p>
  <div class="field"><label>Mã đại lý hoặc Email</label><input id="d-id" placeholder="VD: DL0001 / email"/></div>
  <div class="field"><label>Mật khẩu</label><input id="d-pw" type="password" placeholder="••••••••"/></div>
  <button class="btn btn-primary btn-block" id="dBtn">Đăng nhập</button>
  <p style="font-size:13px;text-align:center;margin-top:16px;color:var(--stone)">Chưa có tài khoản đại lý? <a href="dang-ky-dai-ly.html" style="color:var(--tea);font-weight:600">Đăng ký ngay</a></p>
  <div class="box" style="margin-top:16px;font-size:12px">Cổng đại lý (bảng giá riêng, đặt hàng sỉ, công nợ, doanh số, tài liệu bán hàng) sẽ được kích hoạt đầy đủ khi hệ thống backend hoàn thiện.</div>
 </div>
</main>
<script src="assets/layout.js?v=170730"></script><script>document.getElementById('dBtn').onclick=()=>{const id=document.getElementById('d-id').value.trim();if(!id){showToast('Nhập mã đại lý hoặc email');return;}showToast('Cổng đại lý sẽ kích hoạt khi có backend. Vui lòng liên hệ 0855 256 512.');};</script></body></html>
